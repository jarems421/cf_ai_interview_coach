name = "cf-ai-interview-coach-api"
main = "src/index.ts"
compatibility_date = "2026-04-26"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "interview_coach"
database_id = "b872d85f-64ad-40ee-a4f0-d595438af467"
migrations_dir = "migrations"

# Rate limiting: 100 requests per minute per IP on all API routes
# Set namespace_id to a unique integer that identifies this rate limit rule
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"

[unsafe.bindings.simple]
limit = 100
period = 60
